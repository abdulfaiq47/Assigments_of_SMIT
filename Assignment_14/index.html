<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System | Elite Admin</title>
    <link rel="stylesheet" href="/static/styles.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->



        <!-- Main Content -->
        <main class="main-content">
            <header>
                <div class="header-left">
                    <h1>Student Dashboard</h1>
                    <p>Manage your students and their performance effortlessly.</p>
                </div>
                <div class="header-right">
                    <button id="addStudentBtn" class="btn btn-primary">
                        <i data-lucide="plus"></i> Add Student
                    </button>
                </div>
            </header>

            <!-- Stats Grid -->
            <section class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon indigo">
                        <i data-lucide="users"></i>
                    </div>
                    <div class="stat-details">
                        <span class="stat-label">Total Students</span>
                        <span id="totalStudents" class="stat-value">0</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon emerald">
                        <i data-lucide="book-check"></i>
                    </div>
                    <div class="stat-details">
                        <span class="stat-label">Active Courses</span>
                        <span class="stat-value">3</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon amber">
                        <i data-lucide="award"></i>
                    </div>
                    <div class="stat-details">
                        <span class="stat-label">Avg. Performance</span>
                        <span class="stat-value">85%</span>
                    </div>
                </div>
            </section>

            <!-- Student List Section -->
            <section class="list-section">
                <div class="list-header">
                    <h2>Student List</h2>
                    <div class="search-box">
                        <i data-lucide="search"></i>
                        <input type="text" id="searchInput" placeholder="Search students...">
                    </div>
                </div>
                <div class="table-container">
                    <table id="studentTable">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Age</th>
                                <th>Course</th>
                                <th class="actions-header">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="studentListBody">
                            <!-- Data will be injected here -->
                        </tbody>
                    </table>
                    <div id="noData" class="no-data hidden">
                        <i data-lucide="folder-open"></i>
                        <p>No students found. Add one to get started!</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Student Modal -->
    <div id="studentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Student</h2>
                <button id="closeModal" class="close-btn"><i data-lucide="x"></i></button>
            </div>
            <form id="studentForm">
                <input type="hidden" id="studentId">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="john@example.com">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="age">Age</label>
                        <input type="number" id="age" required min="1" placeholder="20">
                    </div>
                    <div class="form-group">
                        <label for="course">Course</label>
                        <select id="course" required>
                            <option value="" disabled selected>Select Course</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="Mathematics">Mathematics</option>
                            <option value="Physics">Physics</option>
                            <option value="Software Engineering">Software Engineering</option>
                            <option value="Artificial Intelligence">Artificial Intelligence</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" id="cancelModal" class="btn btn-secondary">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Student</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Author Badge -->
    <div class="author-badge">
        <i data-lucide="code"></i>
        <span>Made by Abdul Faiq</span>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast">
        <i id="toastIcon"></i>
        <span id="toastMessage"></span>
    </div>

    <script src="/static/script.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
